<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L’INTERVALLE — Marie Männlein</title>

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Georgia,"Times New Roman",serif;
  color:#1b1b1a;

  background:
    radial-gradient(circle at 50% 42%, #f7f1e8 0%, #e7ded0 55%, #d3c6b5 100%);
}

/* ===== HEADER ===== */
.site-header{
  height:92px;
  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,0.78);
  backdrop-filter:blur(18px);

  position:fixed;
  top:0;
  width:100%;
}

.container{
  width:100%;
  max-width:1180px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
}

.logo-img{
  height:68px; /* 🔥 LOGO PLUS PRÉSENT */
}

.site-nav{
  display:flex;
  gap:34px;
}

.site-nav a{
  text-decoration:none;
  font-size:12px;
  color:#5c564f;
  letter-spacing:0.14em;
}

/* ===== HERO ===== */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding-top:92px;
  gap:28px;
}

/* ===== TITRE ===== */
.title{
  font-size:clamp(42px,5vw,82px);
  letter-spacing:0.18em;
  font-weight:500;
}

/* ===== POINT OR (REMPLACE ÉTOILE) ===== */
.gold-dot{
  width:8px;
  height:8px;
  border-radius:50%;

  background:radial-gradient(circle,#f3dfb3 0%,#b8892e 60%,#8c6a1c 100%);
  box-shadow:0 0 12px rgba(212,175,55,0.6);

  animation:breath 3.2s ease-in-out infinite;
}

/* ===== NOM ===== */
.name{
  font-size:11px;
  letter-spacing:0.45em;
  color:#5c564f;
}

/* ===== TEXTE ===== */
.text{
  max-width:420px;
  font-size:16px;
  line-height:2;
  color:#5c564f;
}

/* ===== ANIMATION ===== */
@keyframes breath{
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.5);opacity:0.7;}
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .container{
    flex-direction:column;
    gap:8px;
  }

  .site-nav{
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
  }

  .logo-img{
    height:52px;
  }

  .title{
    font-size:32px;
  }

  .text{
    font-size:14px;
  }

}

</style>
</head>

<body>

<header class="site-header">
  <div class="container">

    <img src="/logo.png" class="logo-img">

    <nav class="site-nav">
      <a href="/pages/accompagnement.html">Accompagnement</a>
      <a href="/pages/entreprises.html">Entreprises</a>
      <a href="/pages/distance.html">À distance</a>
      <a href="/pages/histoire.html">L’INTERVALLE</a>
      <a href="/pages/contact.html">Contact</a>
    </nav>

  </div>
</header>

<section class="hero">

  <div class="title">L’INTERVALLE</div>

  <!-- 🔥 POINT OR PREMIUM -->
  <div class="gold-dot"></div>

  <div class="name">MARIE MÄNNLEIN</div>

  <div class="text">
    Un espace pour se reconnecter à soi,<br>
    explorer ses racines<br>
    et ajuster son équilibre.
  </div>

</section>

</body>
</html>

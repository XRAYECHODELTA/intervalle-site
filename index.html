<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L’INTERVALLE — Marie Männlein</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      color: #1b1b1a;
      background: radial-gradient(circle at 50% 42%, #f7f1e8 0%, #e7ded0 55%, #d3c6b5 100%);
    }

    .site-header {
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
      position: fixed;
      width: 100%;
      top: 0;
    }

    .container {
      width: 100%;
      max-width: 1180px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
    }

    .logo-img {
      height: 78px;
    }

    .site-nav {
      display: flex;
      gap: 36px;
    }

    .site-nav a {
      text-decoration: none;
      font-size: 12px;
      color: #5c564f;
      letter-spacing: 0.15em;
    }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: 90px;
    }

    .title {
      font-size: clamp(44px, 5vw, 88px);
      letter-spacing: 0.20em;
      font-weight: 500;
    }

    /* ===== AXE CENTRAL AVEC L'ÉTOILE ET LIGNES ===== */
    .axis {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      margin-top: 26px;
    }

    .star-container {
      display: flex;
      align-items: center;
      margin-top: 10px; /* Adjusted position of the star */
    }

    .gold-star {
      width: 96px; /* Increased size of the star */
      height: 96px;
      background-color: transparent;
      border: none;
      position: relative;
      animation: shimmer 2s infinite alternate;
    }

    .gold-star:before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 48px; /* Adjusted to make the star larger */
      height: 48px;
      background-color: #b8892e;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }

    .gold-line {
      width: 160px;
      height: 2px;
      background-color: #b8892e;
      margin: 0 10px;
    }

    .name {
      font-size: 18px;
      letter-spacing: 0.5em;
      color: #5c564f;
    }

    .text {
      margin-top: 28px;
      max-width: 420px;
      font-size: 16px;
      line-height: 2.1;
      color: #5c564f;
    }

    .cta-button {
      margin-top: 40px;
      padding: 12px 36px;
      border: 1px solid #b8892e;
      color: #b8892e;
      background-color: transparent;
      text-decoration: none;
      letter-spacing: 0.14em;
      font-size: 16px;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .cta-button:hover {
      background-color: #b8892e;
      color: white;
      transform: translateY(-3px);
    }

    /* ===== BACKGROUND AND BUTTON STYLES ===== */
    .cta-text {
      font-size: 20px;
      line-height: 1.6;
      color: #5c564f;
      background: radial-gradient(circle at 50% 50%, #f7f1e8 0%, #e7ded0 60%, #d3c6b5 100%);
      padding: 20px;
      border-radius: 8px;
      margin-top: 40px;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        gap: 8px;
      }

      .site-nav {
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      .logo-img {
        height: 58px;
      }

      .title {
        font-size: 32px;
        letter-spacing: 0.16em;
      }

      .axis {
        gap: 22px;
        margin-top: 20px;
      }

      .text {
        font-size: 14px;
        margin-top: 24px;
      }

      .cta-button {
        font-size: 14px;
      }

      .cta-text {
        font-size: 16px;
      }
    }

    /* Star shimmer animation */
    @keyframes shimmer {
      0% {
        transform: translate(-50%, -50%) rotate(45deg) scale(1);
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.7);
      }
      100% {
        transform: translate(-50%, -50%) rotate(45deg) scale(1.2);
        box-shadow: 0 0 20px rgba(212, 175, 55, 1);
      }
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="container">
    <a href="/index.html"><img src="/logo.png" class="logo-img" alt="L'INTERVALLE"></a>
    <nav class="site-nav">
      <a href="/pages/accompagnement.html">Accompagnement</a>
      <a href="/pages/entreprises.html">Entreprises</a>
      <a href="/pages/distance.html">À distance</a>
      <a href="/pages/histoire.html">L’INTERVALLE</a>
      <a href="/pages/contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="title">L’INTERVALLE</div>

  <div class="axis">
    <div class="star-container">
      <div class="gold-line"></div>
      <div class="gold-star"></div>
      <div class="gold-line"></div>
    </div>
    <div class="name">MARIE MÄNNLEIN</div>
  </div>

  <div class="cta-text">
    Un espace pour se reconnecter, explorer ses racines et se réajuster à son rythme.
  </div>
  <a href="/pages/contact.html" class="cta-button">Contactez-moi pour en discuter</a>

</section>

</body>
</html>

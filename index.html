<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L’INTERVALLE — Marie Männlein</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Georgia,"Times New Roman",serif;
  color:#1b1b1a;
  background:
    radial-gradient(circle at 50% 42%, #f7f1e8 0%, #e7ded0 55%, #d3c6b5 100%);
}

.site-header{
  height:90px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  background:rgba(255,255,255,0.78);
  backdrop-filter:blur(18px);
  position:fixed;
  width:100%;
  top:0;
  padding-left:30px; /* Plus de marge à gauche pour logo */
}

.container{
  width:100%;
  max-width:1180px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
}

.logo-img{
  height:90px; /* Logo plus grand */
}

.site-nav{
  display:flex;
  gap:36px;
}

.site-nav a{
  text-decoration:none;
  font-size:12px;
  color:#5c564f;
  letter-spacing:0.15em;
}

.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding-top:120px;
}

.title{
  font-size:clamp(44px,5vw,88px);
  letter-spacing:0.20em;
  font-weight:500;
}

.axis{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
  margin-top:26px;
}

.gold-dot{
  width:8px; /* Taille ajustée pour étoile visible */
  height:8px;
  border-radius:50%;
  background:radial-gradient(circle,#f3dfb3,#b8892e);
  box-shadow:0 0 15px rgba(212,175,55,0.8);
}

.name{
  font-size:11px;
  letter-spacing:0.5em;
  color:#5c564f;
}

.text{
  margin-top:28px;
  max-width:420px;
  font-size:16px;
  line-height:2.1;
  color:#5c564f;
}

/* Lignes dorées de chaque côté */
.axis::before, .axis::after{
  content: "";
  width: 100px;
  height: 2px;
  background-color: #b8892e; /* Lignes dorées */
}

@media(max-width:768px){
  .container{
    flex-direction:column;
    gap:8px;
  }

  .site-nav{
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
  }

  .logo-img{
    height:58px;
  }

  .title{
    font-size:32px;
    letter-spacing:0.16em;
  }

  .axis{
    gap:22px;
    margin-top:20px;
  }

  .text{
    font-size:14px;
    margin-top:24px;
  }
}

</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="/index.html"><img src="/logo.png" class="logo-img" alt="L'INTERVALLE"></a>
    <nav class="site-nav">
      <a href="/pages/accompagnement.html">Accompagnement</a>
      <a href="/pages/entreprises.html">Entreprises</a>
      <a href="/pages/distance.html">À distance</a>
      <a href="/pages/histoire.html">L’INTERVALLE</a>
      <a href="/pages/contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="hero">

  <div class="title">L’INTERVALLE</div>

  <div class="axis">
    <div class="gold-dot"></div>
    <div class="name">MARIE MÄNNLEIN</div>
  </div>

  <div class="text">
    Un espace pour se reconnecter à soi,<br>
    explorer ses racines<br>
    et ajuster son équilibre.
  </div>

</section>

</body>
</html>

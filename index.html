<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L’INTERVALLE — Marie Männlein</title>

<link rel="stylesheet" href="/assets/css/main.css">

<style>

/* ===== BASE ===== */
.hero-section{
  min-height:calc(100vh - var(--header-height));
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:100px 20px 120px;
  gap:34px;
}

/* ===== TITRE ===== */
.page-title{
  font-size:clamp(42px,5vw,72px);
  letter-spacing:0.12em;
  font-weight:500;
  animation:fadeUp 1.2s ease forwards;
}

/* ===== DIVIDER ===== */
.divider{
  margin:6px 0 18px;
  animation:fadeUp 1.6s ease forwards;
}

.divider svg{
  width:340px;
}

/* lignes */
.divider line{
  stroke:var(--gold);
  stroke-width:1;
  opacity:0.55;
}

/* étoile */
.star-core{
  fill:var(--gold-soft);
  filter:drop-shadow(0 0 8px rgba(212,175,55,0.5));
  animation:pulse 3s ease-in-out infinite;
}

.star-cross{
  stroke:var(--gold);
  stroke-width:1.2;
}

.star-glow{
  fill:none;
  stroke:var(--gold-soft);
  stroke-width:0.6;
  opacity:0.3;
  animation:halo 4s ease-in-out infinite;
}

/* ===== NOM ===== */
.hero-sub{
  font-size:13px;
  letter-spacing:0.35em;
  color:var(--muted);
  animation:fadeUp 1.8s ease forwards;
}

/* ===== TEXTE ===== */
.intro-luxe{
  max-width:560px;
  font-size:18px;
  line-height:2;
  color:var(--text);
  animation:fadeUp 2.2s ease forwards;
}

/* ===== HEADER ===== */
.site-header{
  backdrop-filter:blur(8px);
  background:rgba(250,248,244,0.75);
  transition:all 0.4s ease;
}

.logo-img{
  height:60px;
  transition:all 0.4s ease;
}

.logo-img:hover{
  transform:scale(1.04);
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.2);}
}

@keyframes halo{
  0%{transform:scale(1);opacity:0.3;}
  50%{transform:scale(1.7);opacity:0;}
  100%{transform:scale(1);opacity:0.3;}
}

</style>

</head>

<body>

<header class="site-header">
  <div class="container">

    <div class="logo">
      <a href="/index.html">
        <img src="/logo.png" class="logo-img" alt="L'INTERVALLE">
      </a>
    </div>

    <nav class="site-nav">
      <a href="/pages/accompagnement.html">Accompagnement</a>
      <a href="/pages/entreprises.html">Entreprises</a>
      <a href="/pages/distance.html">À distance</a>
      <a href="/pages/histoire.html">L’INTERVALLE</a>
      <a href="/pages/contact.html">Contact</a>
    </nav>

  </div>
</header>

<main>

<section class="hero-section">

  <h1 class="page-title">L’INTERVALLE</h1>

  <div class="divider">
    <svg viewBox="0 0 320 34">

      <line x1="20" y1="17" x2="140" y2="17"/>
      <line x1="180" y1="17" x2="300" y2="17"/>

      <g transform="translate(160,17)">
        <circle class="star-glow" r="9"/>
        <line class="star-cross" x1="-6" y1="0" x2="6" y2="0"/>
        <line class="star-cross" x1="0" y1="-6" x2="0" y2="6"/>
        <circle class="star-core" r="2"/>
      </g>

    </svg>
  </div>

  <p class="hero-sub">MARIE MÄNNLEIN</p>

  <div class="intro-luxe">
    Un espace pour se reconnecter à soi,<br>
    explorer ses racines<br>
    et ajuster son équilibre.
  </div>

</section>

</main>

<!-- PAS DE FOOTER VOLONTAIRE -->

</body>
</html>

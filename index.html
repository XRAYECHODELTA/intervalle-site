<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L’INTERVALLE — Marie Männlein</title>

<style>

/* ===== RESET GLOBAL ===== */
*,
*::before,
*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Georgia,"Times New Roman",serif;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  color:#1b1b1a;

  background:
    radial-gradient(circle at 50% 42%, #f7f1e8 0%, #e7ded0 55%, #d3c6b5 100%);
}

img{
  max-width:100%;
  display:block;
}

/* ===== VARIABLES ===== */
:root{
  --gold:#b8892e;
  --gold-soft:#e2c98f;
  --muted:#5c564f;

  --header-height:92px;
  --max-width:1180px;
}

/* ===== HEADER ===== */
.site-header{
  height:var(--header-height);
  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,0.78);
  backdrop-filter:blur(18px);

  position:fixed;
  top:0;
  width:100%;
  z-index:20;
}

.container{
  width:100%;
  max-width:var(--max-width);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
}

.logo-img{
  height:58px;
}

.site-nav{
  display:flex;
  gap:34px;
}

.site-nav a{
  text-decoration:none;
  font-size:12px;
  color:var(--muted);
  letter-spacing:0.14em;
  position:relative;
}

.site-nav a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-6px;
  width:0%;
  height:1px;
  background:linear-gradient(90deg,#e6c87f,#b8892e);
  transition:0.3s;
}

.site-nav a:hover::after{
  width:100%;
}

/* ===== HERO ===== */
.hero-section{
  min-height:calc(100vh - var(--header-height));
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;

  padding:60px 20px 80px;
  gap:22px;
}

/* ===== TITRE ===== */
.page-title{
  font-size:clamp(38px,5vw,76px);
  letter-spacing:0.16em;
  font-weight:500;
}

/* ===== DIVIDER OR PREMIUM ===== */
.divider svg{
  width:340px;
}

/* ===== NOM ===== */
.hero-sub{
  font-size:11px;
  letter-spacing:0.42em;
  color:var(--muted);
}

/* ===== TEXTE ===== */
.intro-luxe{
  margin-top:18px;
  max-width:460px;
  font-size:16px;
  line-height:2.05;
  color:var(--muted);
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .container{
    flex-direction:column;
    gap:8px;
  }

  .site-nav{
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
  }

  .logo-img{
    height:46px;
  }

  .hero-section{
    padding:140px 18px 80px;
  }

  .page-title{
    font-size:30px;
  }

  .divider svg{
    width:220px;
  }

  .intro-luxe{
    font-size:14px;
  }

}

</style>
</head>

<body>

<header class="site-header">
  <div class="container">

    <div class="logo">
      <a href="/index.html">
        <img src="/logo.png" class="logo-img" alt="L'INTERVALLE">
      </a>
    </div>

    <nav class="site-nav">
      <a href="/pages/accompagnement.html">Accompagnement</a>
      <a href="/pages/entreprises.html">Entreprises</a>
      <a href="/pages/distance.html">À distance</a>
      <a href="/pages/histoire.html">L’INTERVALLE</a>
      <a href="/pages/contact.html">Contact</a>
    </nav>

  </div>
</header>

<main>

<section class="hero-section">

  <h1 class="page-title">L’INTERVALLE</h1>

  <div class="divider">
    <svg viewBox="0 0 320 34">

      <defs>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%">
          <stop offset="0%" stop-color="#e6c87f"/>
          <stop offset="50%" stop-color="#b8892e"/>
          <stop offset="100%" stop-color="#f3dfb3"/>
        </linearGradient>

        <radialGradient id="goldGlow">
          <stop offset="0%" stop-color="#f3dfb3" stop-opacity="1"/>
          <stop offset="100%" stop-color="#b8892e" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- lignes -->
      <line x1="10" y1="17" x2="140" y2="17"
        stroke="url(#goldGradient)" stroke-width="1.2"/>

      <line x1="180" y1="17" x2="310" y2="17"
        stroke="url(#goldGradient)" stroke-width="1.2"/>

      <!-- étoile -->
      <g transform="translate(160,17)">

        <circle r="10" fill="url(#goldGlow)" opacity="0.6">
          <animate attributeName="r" values="8;14;8" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
        </circle>

        <line x1="-7" y1="0" x2="7" y2="0"
          stroke="url(#goldGradient)" stroke-width="1.6"/>

        <line x1="0" y1="-7" x2="0" y2="7"
          stroke="url(#goldGradient)" stroke-width="1.6"/>

        <circle r="2.6" fill="url(#goldGradient)">
          <animate attributeName="r" values="2.6;3.4;2.6" dur="2.2s" repeatCount="indefinite"/>
        </circle>

      </g>

    </svg>
  </div>

  <p class="hero-sub">MARIE MÄNNLEIN</p>

  <div class="intro-luxe">
    Un espace pour se reconnecter à soi,<br>
    explorer ses racines<br>
    et ajuster son équilibre.
  </div>

</section>

</main>

</body>
</html>

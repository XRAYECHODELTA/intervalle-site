<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact — L’INTERVALLE</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Georgia,"Times New Roman",serif;
  color:#1b1b1a;

  background:
    radial-gradient(circle at 50% 42%, #f7f1e8 0%, #e7ded0 55%, #d3c6b5 100%);

  overflow-x:hidden;

  animation:pageFade 1.2s ease;
}

@keyframes pageFade{
  from{
    opacity:0;
  }
  to{
    opacity:1;
  }
}

/* HEADER */

.site-header{
  position:fixed;
  top:0;
  left:0;

  width:100%;
  height:90px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(255,255,255,0.76);

  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);

  border-bottom:1px solid rgba(0,0,0,0.05);

  z-index:999;
}

.container{
  width:100%;
  max-width:1080px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 24px;
}

.logo-img{
  height:70px;

  transition:transform .35s ease;
}

.logo-img:hover{
  transform:scale(1.04);
}

.site-nav{
  display:flex;
  align-items:center;
  gap:34px;
}

.site-nav a{
  text-decoration:none;

  font-size:12px;
  letter-spacing:0.16em;

  color:#5c564f;

  transition:
    color .3s ease,
    transform .3s ease;
}

.site-nav a:hover{
  color:#b8892e;
  transform:translateY(-2px);
}

/* PAGE */

.page{
  width:100%;
  max-width:940px;

  margin:auto;

  padding:
    135px
    24px
    40px;

  text-align:center;
}

/* HERO */

.hero-section{
  margin-bottom:34px;

  animation:fadeUp 1s ease;
}

.page-title{
  font-size:clamp(42px,4vw,56px);

  letter-spacing:0.14em;
  font-weight:400;

  margin-bottom:18px;

  color:#161616;
}

.divider{
  width:100%;

  display:flex;
  justify-content:center;

  margin-bottom:22px;

  opacity:.92;
}

.divider svg{
  width:260px;
  height:auto;
}

.hero-sub{
  font-size:18px;

  color:#5f5951;

  letter-spacing:0.08em;
}

/* CONTACT BLOCK */

.text-block{
  position:relative;

  max-width:720px;

  margin:
    0 auto
    34px;

  padding:
    42px
    42px;

  border:1px solid rgba(184,137,46,0.12);

  border-radius:30px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.46) 0%,
      rgba(255,255,255,0.18) 100%
    );

  backdrop-filter:blur(10px);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.04);

  animation:fadeUp 1.2s ease;
}

.text-block::before{
  content:"";

  position:absolute;

  top:0;
  left:50%;

  transform:translateX(-50%);

  width:120px;
  height:1px;

  background:
    linear-gradient(
      90deg,
      transparent,
      #c9a25d,
      transparent
    );
}

.text-block p{
  font-size:18px;
  line-height:2;

  color:#4e4942;
}

.text-block p + p{
  margin-top:22px;
}

/* CONTACT INFOS */

.contact-links{
  margin-top:8px;
}

.contact-links a{
  color:#1b1b1a;

  text-decoration:none;

  transition:
    color .3s ease,
    opacity .3s ease;
}

.contact-links a:hover{
  color:#b8892e;
}

.contact-name{
  font-size:20px;

  letter-spacing:0.05em;

  color:#2f2b27;
}

/* CTA */

.cta{
  margin-top:12px;

  animation:fadeUp 1.4s ease;
}

.cta-button{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  padding:
    16px
    34px;

  border:1px solid #b8892e;

  border-radius:999px;

  background:rgba(255,255,255,0.42);

  color:#b8892e;

  text-decoration:none;

  font-size:12px;
  letter-spacing:0.18em;

  transition:
    transform .35s ease,
    background .35s ease,
    color .35s ease,
    box-shadow .35s ease;
}

.cta-button:hover{
  background:#b8892e;
  color:white;

  transform:
    translateY(-3px)
    scale(1.03);

  box-shadow:
    0 12px 30px rgba(184,137,46,0.25);
}

/* ANIMATIONS */

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(24px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

/* MOBILE */

@media(max-width:768px){

  .site-header{
    height:auto;
    padding:12px 0;
  }

  .container{
    flex-direction:column;
    gap:12px;
  }

  .logo-img{
    height:54px;
  }

  .site-nav{
    flex-wrap:wrap;
    justify-content:center;
    gap:14px;
  }

  .site-nav a{
    font-size:11px;
  }

  .page{
    padding-top:150px;
  }

  .page-title{
    font-size:34px;
  }

  .hero-sub{
    font-size:16px;
  }

  .text-block{
    padding:30px 24px;

    border-radius:24px;
  }

  .text-block p{
    font-size:16px;
    line-height:1.9;
  }

  .contact-name{
    font-size:18px;
  }

}

</style>
</head>

<body>

<header class="site-header">

  <div class="container">

    <a href="/index.html">
      <img src="/logo.png" class="logo-img" alt="L’INTERVALLE">
    </a>

    <nav class="site-nav">
      <a href="/pages/accompagnement.html">Accompagnement</a>
      <a href="/pages/entreprises.html">Entreprises</a>
      <a href="/pages/distance.html">À distance</a>
      <a href="/pages/histoire.html">L’INTERVALLE</a>
      <a href="/pages/contact.html">Contact</a>
    </nav>

  </div>

</header>

<main class="page">

  <!-- HERO -->
  <section class="hero-section">

    <h1 class="page-title">
      Contact
    </h1>

    <div class="divider">

      <svg viewBox="0 0 320 34">

        <line x1="20" y1="17" x2="140" y2="17" stroke="#b8892e"/>

        <line x1="180" y1="17" x2="300" y2="17" stroke="#b8892e"/>

        <line x1="160" y1="10" x2="160" y2="24" stroke="#b8892e"/>

        <line x1="152" y1="17" x2="168" y2="17" stroke="#b8892e"/>

        <circle cx="160" cy="17" r="1.5" fill="#e2c98f"/>

      </svg>

    </div>

    <p class="hero-sub">
      Prenons un moment pour échanger.
    </p>

  </section>

  <!-- CONTACT -->
  <section class="text-block">

    <p>
      Vous pouvez contacter
      <span class="contact-name">Marie Männlein</span>
      directement :
    </p>

    <p class="contact-links">

      📞
      <a href="tel:0661582369">
        06 61 58 23 69
      </a>

      <br><br>

      ✉️
      <a href="mailto:marie@lintervalle.live">
        marie@lintervalle.live
      </a>

    </p>

    <p>
      Chaque demande reçoit une réponse attentive,
      confidentielle et personnalisée.
    </p>

  </section>

  <!-- CTA -->
  <section class="cta">

    <a href="mailto:marie@lintervalle.live" class="cta-button">
      Envoyer un message
    </a>

  </section>

</main>

</body>
</html>

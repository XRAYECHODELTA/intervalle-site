<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Page introuvable — L’INTERVALLE</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Georgia,"Times New Roman",serif;
  color:#1b1b1a;
  background:
    radial-gradient(circle at 50% 30%, #f8f3ea 0%, #e8dfd2 54%, #d4c7b7 100%);
  overflow-x:hidden;
  min-height:100vh;
  position:relative;
  animation:pageFade 1s ease;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 18%, rgba(255,255,255,0.38), transparent 38%),
    linear-gradient(to bottom, rgba(255,255,255,0.10), transparent);
  pointer-events:none;
  z-index:-1;
}

@keyframes pageFade{
  from{opacity:0;}
  to{opacity:1;}
}

.site-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:92px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.74);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(184,137,46,0.08);
  z-index:999;
}

.container{
  width:100%;
  max-width:1180px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
}

.logo-wrapper{
  padding:8px;
  border:1px solid rgba(122,95,52,0.26);
  border-radius:4px;
  background:rgba(255,255,255,0.12);
  transition:border-color .35s ease, box-shadow .35s ease, transform .35s ease;
}

.logo-wrapper:hover{
  border-color:rgba(184,137,46,0.55);
  box-shadow:0 0 18px rgba(184,137,46,0.08);
  transform:translateY(-1px);
}

.logo-img{
  height:72px;
  display:block;
  transition:transform .35s ease, opacity .35s ease;
}

.logo-img:hover{
  transform:scale(1.02);
  opacity:.95;
}

.site-nav{
  display:flex;
  align-items:center;
  gap:34px;
}

.site-nav a{
  position:relative;
  text-decoration:none;
  font-size:12px;
  letter-spacing:0.16em;
  color:#5c564f;
  transition:color .3s ease, transform .3s ease;
}

.site-nav a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-8px;
  width:0%;
  height:1px;
  background:#b8892e;
  transition:width .35s ease;
}

.site-nav a:hover{
  color:#b8892e;
  transform:translateY(-2px);
}

.site-nav a:hover::after{
  width:100%;
}

.page{
  width:100%;
  max-width:980px;
  min-height:100vh;
  margin:auto;
  padding:145px 24px 70px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-section{
  margin-bottom:38px;
}

.page-title{
  font-size:clamp(82px,9vw,150px);
  letter-spacing:0.18em;
  font-weight:400;
  margin-bottom:20px;
  color:#151515;
  text-shadow:0 1px 0 rgba(255,255,255,0.6);
}

.divider{
  display:flex;
  justify-content:center;
  margin-bottom:26px;
  opacity:.92;
}

.divider svg{
  width:320px;
  max-width:100%;
}

.hero-sub{
  position:relative;
  max-width:720px;
  margin:auto;
  padding:30px 42px;
  font-size:20px;
  line-height:2;
  color:#4e4942;
  border-radius:34px;
  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.42),
      rgba(255,255,255,0.16)
    );
  border:1px solid rgba(184,137,46,0.10);
  backdrop-filter:blur(10px);
}

.hero-sub::before{
  content:"";
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  height:1px;
  background:
    linear-gradient(
      90deg,
      transparent,
      #cba45f,
      transparent
    );
}

.cta{
  margin-top:8px;
}

.cta-button{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:17px 40px;
  border:1px solid rgba(184,137,46,0.82);
  border-radius:999px;
  background:rgba(255,255,255,0.30);
  color:#b8892e;
  text-decoration:none;
  font-size:12px;
  letter-spacing:0.20em;
  transition:transform .35s ease, background .35s ease, color .35s ease, box-shadow .35s ease;
}

.cta-button:hover{
  background:#b8892e;
  color:white;
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 12px 28px rgba(184,137,46,0.22);
}

@media(max-width:768px){

  .site-header{
    height:auto;
    padding:12px 0;
  }

  .container{
    flex-direction:column;
    gap:12px;
  }

  .logo-img{
    height:56px;
  }

  .site-nav{
    flex-wrap:wrap;
    justify-content:center;
    gap:14px;
  }

  .site-nav a{
    font-size:11px;
  }

  .page{
    padding-top:170px;
  }

  .page-title{
    font-size:68px;
    letter-spacing:0.14em;
  }

  .hero-sub{
    padding:26px 22px;
    font-size:16px;
    line-height:2;
  }

}
</style>
</head>

<body>

<header class="site-header">

  <div class="container">

    <a href="/index.html" class="logo-wrapper">
      <img src="/logo.png" class="logo-img" alt="L’INTERVALLE">
    </a>

    <nav class="site-nav">
      <a href="/pages/accompagnement.html">Accompagnement</a>
      <a href="/pages/entreprises.html">Entreprises</a>
      <a href="/pages/distance.html">À distance</a>
      <a href="/pages/histoire.html">L’INTERVALLE</a>
      <a href="/pages/contact.html">Contact</a>
    </nav>

  </div>

</header>

<main class="page">

  <section class="hero-section">

    <h1 class="page-title">
      404
    </h1>

    <div class="divider">

      <svg viewBox="0 0 320 34">

        <line x1="20" y1="17" x2="140" y2="17" stroke="#b8892e"/>

        <line x1="180" y1="17" x2="300" y2="17" stroke="#b8892e"/>

        <line x1="160" y1="10" x2="160" y2="24" stroke="#b8892e"/>

        <line x1="152" y1="17" x2="168" y2="17" stroke="#b8892e"/>

        <circle cx="160" cy="17" r="1.5" fill="#e2c98f"/>

      </svg>

    </div>

    <p class="hero-sub">
      Cette page n’existe pas ou a été déplacée.
    </p>

  </section>

  <section class="cta">

    <a href="/index.html" class="cta-button">
      Retour à l’accueil
    </a>

  </section>

</main>

</body>
</html>
